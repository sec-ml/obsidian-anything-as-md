# Build and package anything-as-md when a version tag is pushed.

name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"   # e.g. 1.0.0 (no v prefix)
  workflow_dispatch:             # run manually: create a version tag first, then run

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create release and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release and upload plugin files
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
